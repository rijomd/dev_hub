# Indicates exactly one field must be supplied and this field must not be `null`.
directive @oneOf on INPUT_OBJECT

type AuthResponse {
  access_token: String!
  email: String!
  name: String!
}

input CreateProjectInput {
  buildCommand: String!
  envVersion: String!
  framework: String!
  gitUrl: String
  installCommand: String!
  isLocal: Boolean = true
  language: String!
  localPath: String
  name: String!
  port: Int!
  runCommand: String!
  stopCommand: String!
}

# A date-time string at UTC, such as 2019-12-03T09:54:33Z, compliant with the date-time format.
scalar DateTime

input LoginInput {
  email: String!
  password: String!
}

type Mutation {
  # Create a new project
  createProject(input: CreateProjectInput!): ProjectObject!

  # Delete a project by ID
  deleteProject(id: Int!): Boolean!

  # Login and receive a JWT token
  login(input: LoginInput!): AuthResponse!

  # Register a new user account
  register(input: RegisterInput!): UserObject!

  # Update an existing project
  updateProject(id: Int!, input: UpdateProjectInput!): ProjectObject!
}

type ProjectObject {
  buildCommand: String!
  createdAt: DateTime!
  envVersion: String!
  framework: String!
  gitUrl: String
  id: Int!
  installCommand: String!
  isLocal: Boolean!
  language: String!
  localPath: String
  name: String!
  port: Int!
  runCommand: String!
  status: String!
  stopCommand: String!
  updatedAt: DateTime!
  uptime: Int!
}

type Query {
  # Get all projects for the authenticated user
  projects: [ProjectObject!]!
}

input RegisterInput {
  email: String!
  name: String!
  password: String!
}

input UpdateProjectInput {
  buildCommand: String
  envVersion: String
  framework: String
  gitUrl: String
  installCommand: String
  isLocal: Boolean
  language: String
  localPath: String
  name: String
  port: Int
  runCommand: String
  status: String
  stopCommand: String
}

type UserObject {
  createdAt: DateTime!
  email: String!
  id: Int!
  name: String!
}
